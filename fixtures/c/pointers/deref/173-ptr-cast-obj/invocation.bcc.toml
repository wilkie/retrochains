description = "Pointer cast `(int *)&x` — semantically a no-op (both sides are `int *`), but exercises pointer-type parsing inside a cast. The OBJ should match a hypothetical `int *p = &x;` without the cast: parse and discard the type decoration, lower the operand normally."
tool = "bcc"
args = ["-c", "-ms", "HELLO.C"]
link_args = ['-LC:\LIB', '-ms', 'HELLO.C']
inputs = ["HELLO.C"]
asm_args = ["-S", "-ms", "HELLO.C"]
