name: wasm

# Builds the @retrochains WASM modules (bcc toolchain, msc compiler, compiler-free
# decompiler + fingerprint), enforces per-module size budgets, and runs the Node
# smoke tests that drive each end-to-end. The wasm analog of the byte-exact
# discipline: a size *ceiling* (scripts/check-wasm-size.sh) plus a functional check.

on:
  push:
    paths:
      - "crates/**"
      - "packages/**"
      - "scripts/build-wasm.sh"
      - "scripts/check-wasm-size.sh"
      - ".github/workflows/wasm.yml"
  pull_request:
    paths:
      - "crates/**"
      - "packages/**"
      - "scripts/build-wasm.sh"
      - "scripts/check-wasm-size.sh"
      - ".github/workflows/wasm.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the channel + wasm32 target; rustup honors it.
      - name: Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      # wasm-bindgen-cli must match the wasm-bindgen crate version (the pin in the
      # *-wasm crates). binstall fetches a prebuilt binary fast.
      - name: Install wasm-bindgen-cli (version-matched)
        run: |
          WB_VER="$(sed -n 's/^wasm-bindgen = "=\(.*\)"/\1/p' crates/bcc-wasm/Cargo.toml)"
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y "wasm-bindgen-cli@${WB_VER}"

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Build WASM modules
        run: |
          bash scripts/build-wasm.sh bcc-wasm bcc bcc_wasm
          bash scripts/build-wasm.sh msc-wasm msc msc_wasm
          bash scripts/build-wasm.sh decompile-wasm decompile decompile_wasm

      - name: Enforce size budgets
        run: |
          bash scripts/check-wasm-size.sh bcc bcc_wasm
          bash scripts/check-wasm-size.sh msc msc_wasm
          bash scripts/check-wasm-size.sh decompile decompile_wasm

      - name: Build TypeScript + smoke tests
        run: |
          pnpm install
          pnpm -r run build:ts
          pnpm -r run test
